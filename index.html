        function getLocalDate() {

        // ================= FIREBASE CRUD LOGIC =================
        async function saveToFirebase(collectionName, payload) {
            if(!firebaseUser) throw new Error("Not authenticated to database");
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, payload.id);
            await setDoc(docRef, payload);
        }

        async function deleteFromFirebase(collectionName, id) {
            if(!firebaseUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, id);
            await deleteDoc(docRef);
        }

        async function batchSaveToFirebase(collectionName, payloadArray) {
            if(!firebaseUser) return;
            const batches = [];
            let batch = writeBatch(db);
            let count = 0;
            for(const item of payloadArray) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, item.id);
                batch.set(docRef, item);
                count++;
                if (count === 490) {
                    batches.push(batch.commit());
                    batch = writeBatch(db);
                    count = 0;
                }
            }
            if (count > 0) batches.push(batch.commit());
            await Promise.all(batches);
        }

        async function deleteAllFromFirebase(collectionName) {
            if(!firebaseUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
            const snap = await getDocs(colRef);
            let batch = writeBatch(db);
            let count = 0;
            const batches = [];
            for (const document of snap.docs) {
                if (collectionName === 'users' && document.id === 'U-001') continue;
                batch.delete(document.ref);
                count++;
                if (count === 490) {
                     batches.push(batch.commit());
                     batch = writeBatch(db);
                     count = 0;
                }
            }
            if (count > 0) batches.push(batch.commit());
            await Promise.all(batches);
        }

            if(listenersAttached || !firebaseUser) return;
            listenersAttached = true;

            collections.forEach(colName => {

        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        let canvas = document.createElement('canvas'); let ctx = canvas.getContext('2d');
                        let maxW = 600, maxH = 600; let width = img.width, height = img.height;
                        if (width > height && width > maxW) { height *= maxW / width; width = maxW; }
                        else if (height > maxH) { width *= maxH / height; height = maxH; }
                        canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.9; let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        const compress = () => {
                            let sizeKB = Math.round((dataUrl.length * 3 / 4) / 1024);
                            if (sizeKB > 25 && quality > 0.1) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); compress(); }
                            else resolve(dataUrl);
                        }; compress();
                    };
                };
            });
        }

        window.handleImageUpload = async function(event, previewId, base64Id) {

            Swal.fire({ title: 'Memproses Foto...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                Swal.close();
            } catch(err) {

            }
        }

        window.handleLogin = async function(e) {
            e.preventDefault(); 
            const u = document.getElementById('loginUsername').value; 
            const p = document.getElementById('loginPassword').value;
            
            if (IS_PREVIEW && u === 'admin' && p === 'edudigital') {
                state.currentUser = { id: "U-PREVIEW", nip: "admin", nama: "Admin Preview", role: "Admin", mapel: "-", foto: "" };
                localStorage.setItem('jantra_user', JSON.stringify(state.currentUser));
                navigate('absensi'); return;
            }

            showLoading(); 
            try { 
                if(state.users.length === 0) {
                    const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                    const snap = await getDocs(usersRef);
                    state.users = snap.docs.map(d => d.data());
                }

                const user = state.users.find(x => x.nip === u || x.nip === `'${u}`);
                const cleanNip = user ? user.nip.replace(/^'/, '') : '';
                const cleanPass = user ? user.password.replace(/^'/, '') : '';

                if(user && cleanNip === u && cleanPass === p) { 
                    state.currentUser = user; 
                    state.currentUser.nip = cleanNip;
                    localStorage.setItem('jantra_user', JSON.stringify(state.currentUser));
                    showToast('success', `Selamat Datang, ${state.currentUser.nama}`); 
                    navigate('absensi'); 
                } else { 
                    Swal.fire('Gagal Login', 'Username / Password salah', 'error'); 
                } 
            } catch(err) { 
                Swal.fire('Gagal Login', 'Terjadi kesalahan sistem/koneksi. ' + err.message, 'error'); 
            } finally {
                closeLoading();
            }
        }

        // --- EXCEL TEMPLATES ---
        window.downloadTemplateUser = function() {
            const ws = XLSX.utils.aoa_to_sheet([["NIP", "Nama", "Password", "Role", "Mapel"]]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data_User");
            XLSX.writeFile(wb, "Template_User.xlsx");
        };

        window.uploadExcelUser = function(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    if(json.length === 0) return Swal.fire('Kosong', 'File Excel tidak berisi data.', 'warning');

                    let payload = json.map((row, i) => ({
                        id: `U-${Date.now()}-${i}`,
                        nip: String(row.NIP || ''),
                        nama: row.Nama || '',
                        password: String(row.Password || '123456'),
                        role: row.Role || 'Guru',
                        mapel: row.Mapel || '-',
                        foto: ''
                    })).filter(x => x.nip && x.nama);

                    if(payload.length > 0) {
                        showLoading();
                        await batchSaveToFirebase('users', payload);
                        closeLoading();
                        Swal.fire('Berhasil', `${payload.length} data User berhasil diimpor!`, 'success');
                    } else {
                        Swal.fire('Gagal', 'Pastikan kolom NIP dan Nama terisi di Excel.', 'error');
                    }
                } catch (err) {
                    closeLoading();
                    Swal.fire('Error', 'Gagal memproses file Excel.', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        };

        window.downloadTemplateSiswa = function() {
            const ws = XLSX.utils.aoa_to_sheet([["No", "NIS", "NISN", "Nama", "JK", "Kelas", "Tahun"]]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data_Siswa");
            XLSX.writeFile(wb, "Template_Siswa.xlsx");
        };

        window.uploadExcelSiswa = function(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    if(json.length === 0) return Swal.fire('Kosong', 'File Excel tidak berisi data.', 'warning');

                    let payload = json.map((row, i) => ({
                        id: `S-${Date.now()}-${i}`,
                        no: row.No || (i+1),
                        nis: String(row.NIS || ''),
                        nisn: String(row.NISN || ''),
                        nama: row.Nama || '',
                        jk: row.JK || 'L',
                        kelas: String(row.Kelas || ''),
                        tahun: String(row.Tahun || ''),
                        foto: ''
                    })).filter(x => x.nama);

                    if(payload.length > 0) {
                        showLoading();
                        await batchSaveToFirebase('siswa', payload);
                        closeLoading();
                        Swal.fire('Berhasil', `${payload.length} data Siswa berhasil diimpor!`, 'success');
                    } else {
                        Swal.fire('Gagal', 'Pastikan kolom Nama terisi di Excel.', 'error');
                    }
                } catch (err) {
                    closeLoading();
                    Swal.fire('Error', 'Gagal memproses file Excel.', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = ''; 
        };
        // ------------------------------------

        window.filterUserRealtime = function() {
            const query = document.getElementById('fuNama').value.toLowerCase();
            const rows = document.querySelectorAll('.user-row');
            let hasVisible = false;
            rows.forEach(row => {
                if(row.cells[2].textContent.toLowerCase().includes(query)) { row.style.display = ''; hasVisible = true; } 
                else row.style.display = 'none';
            });
            let emptyMsg = document.getElementById('userEmptyRow');
            if(emptyMsg) emptyMsg.style.display = hasVisible ? 'none' : '';
            else if(!hasVisible && rows.length > 0) document.getElementById('userTableBody').insertAdjacentHTML('beforeend', `<tr id="userEmptyRow"><td colspan="7" class="p-8 text-center text-gray-400 font-medium">Pencarian tidak ditemukan</td></tr>`);

            e.preventDefault(); closeModal();
            const payload = {

                nip: document.getElementById('uNip').value, 
                nama: document.getElementById('uNama').value, 
                password: document.getElementById('uPass').value, 
                role: document.getElementById('uRole').value, 
                mapel: document.getElementById('uMapel').value, 
                foto: document.getElementById('uBase64').value

            showSyncToast();

                    showSyncToast('Menghapus...');

            Swal.fire({title:'Hapus SEMUA?', text:'Data akan lenyap permanen kecuali akun Admin Anda.', icon:'error', showCancelButton:true, confirmButtonColor:'#d33'}).then(async r=>{ 
                if(r.isConfirmed){ 
                    showLoading();

                        await deleteAllFromFirebase('users'); 
                        closeLoading(); 
                        showToast('success', 'Database dibersihkan'); 
                    } catch(e) { closeLoading(); Swal.fire('Error', 'Gagal Membersihkan', 'error'); }

                if(r.isConfirmed){

                    try { await deleteFromFirebase('jurnal', id); } catch(e){ Swal.fire('Error','Gagal hapus','error'); } 
                } 
            });
        };

        window.autoFillAbsenJurnal = function() {
            const kls = document.getElementById('jKelas').value;
            const tgl = document.getElementById('jTgl').value;
            
            if(!kls || !tgl || kls === 'Istirahat' || kls === 'Kegiatan Umum') return;

            let h=0, s=0, i=0, a=0;
            const relevantAbsensi = state.absensi.filter(ab => ab.kelas === kls && (ab.tanggal === tgl || ab.tgl === tgl));
            
            relevantAbsensi.forEach(ab => {
                if(ab.status_kehadiran === 'Hadir') h++;
                else if(ab.status_kehadiran === 'Sakit') s++;
                else if(ab.status_kehadiran === 'Ijin') i++;
                else if(ab.status_kehadiran === 'Alpha') a++;
            });

            document.getElementById('jHadir').value = h;
            document.getElementById('jSakit').value = s;
            document.getElementById('jIjin').value = i;
            document.getElementById('jAlpha').value = a;
        }

            let optJamM = Array.from({length:10},(_,i)=>`<option value="${i}" ${jMulai==i?'selected':''}>${i}</option>`).join('');

        window.handleKelasJurnalChange = function(val) {
             const rk = document.getElementById('jRekapAbsensi'); const ur = document.getElementById('jUraian');
             if(val === 'Istirahat') { rk.classList.add('hidden'); rk.classList.remove('grid'); ur.disabled = true; ur.classList.add('bg-gray-100', 'cursor-not-allowed', 'text-gray-400'); ur.value = 'Istirahat'; }
             else if (val === 'Kegiatan Umum') { rk.classList.add('hidden'); rk.classList.remove('grid'); ur.disabled = false; ur.classList.remove('bg-gray-100', 'cursor-not-allowed', 'text-gray-400'); if(ur.value==='Istirahat') ur.value=''; }
             else { rk.classList.remove('hidden'); rk.classList.add('grid'); ur.disabled = false; ur.classList.remove('bg-gray-100', 'cursor-not-allowed', 'text-gray-400'); if(ur.value==='Istirahat') ur.value=''; autoFillAbsenJurnal(); }
        }
        
        window.simpanJurnal = async function(e) { 
            e.preventDefault(); 
            let uraianText = document.getElementById('jUraian').value; const kls = document.getElementById('jKelas').value;
            if(kls && kls !== 'Kegiatan Umum' && kls !== 'Istirahat') {
                const h = document.getElementById('jHadir').value || 0; const s = document.getElementById('jSakit').value || 0; const ij = document.getElementById('jIjin').value || 0; const a = document.getElementById('jAlpha').value || 0;
                uraianText = `[H:${h}|S:${s}|I:${ij}|A:${a}] ` + uraianText;
            }
            const p = { 
                id: window.editJurnalData ? window.editJurnalData.id : `J-${Date.now()}`, 
                tgl: document.getElementById('jTgl').value, 
                nip: state.currentUser.nip, 
                nama: state.currentUser.nama, 
                kelas: kls, 
                jamMulai: document.getElementById('jJamMulai').value, 
                jamSelesai: document.getElementById('jJamAkhir').value, 
                uraian: uraianText, 
                foto: document.getElementById('jBase64').value 
            }; 
            
            window.editJurnalData = null; 
            navigate('jurnal'); 
            showSyncToast('Menyimpan jurnal...');
            try { 
                await saveToFirebase('jurnal', p); 
                showToast('success', 'Jurnal tersimpan'); 
            } catch(err){ 
                Swal.fire('Error', 'Gagal simpan', 'error'); 
            } 
        }

        // ================= MODUL ABSENSI DENGAN FILTER GURU =================
        function renderAbsensi() {
            const isGuru = state.currentUser.role === 'Guru';
            const fguru = isGuru ? String(state.currentUser.nip || '').replace(/^'/, '').trim() : (document.getElementById('faGuru')?.value || '').trim();
            
            let btnInputFAB = (isGuru) ? `
                <button onclick="navigate('inputAbsensi')" class="fixed bottom-20 right-6 md:bottom-10 md:right-10 bg-gradient-to-tr from-amber-500 to-orange-500 text-white w-14 h-14 rounded-full shadow-[0_10px_25px_rgba(245,158,11,0.4)] hover:scale-110 hover:rotate-12 transition-all z-40 flex items-center justify-center animate-bounce group" title="Input Absen">
                    <i class="fas fa-plus text-2xl group-hover:animate-spin"></i>
                </button>` : '';

            let baseData = [];
            if (fguru) {
                baseData = state.absensi.filter(a => String(a.nip || a.nip_guru || a.nipGuru || '').replace(/^'/, '').trim() === fguru);
            }

            const fKelas = document.getElementById('faKls')?.value || ''; 
            const fTahun = document.getElementById('faThn')?.value || ''; 
            const fSem = document.getElementById('faSem')?.value || ''; 
            const fNama = (document.getElementById('faNama')?.value || '').toLowerCase();
            
            let filtered = baseData.filter(a => {
                let mKls = fKelas ? a.kelas === fKelas : true; 
                let mThn = fTahun ? a.tahun === fTahun : true; 
                let mSem = fSem ? a.semester === fSem : true; 
                let mNam = (a.nama || '').toLowerCase().includes(fNama);
                return mKls && mThn && mSem && mNam;
            });

            filtered.sort((ab1, ab2) => {
                let sisA = state.siswa.find(s => s.nisn === ab1.nisn); let sisB = state.siswa.find(s => s.nisn === ab2.nisn);
                return (sisA ? parseInt(sisA.no || 0) : 9999) - (sisB ? parseInt(sisB.no || 0) : 9999);
            });

            let optThn = getSavedTahun().map(t=>`<option value="${t}" ${fTahun===t?'selected':''}>${t}</option>`).join('');
            let optKls = getDynamicKelas().map(k=>`<option value="${k}" ${fKelas===k?'selected':''}>${k}</option>`).join('');
            
            let optGuru = state.users.filter(u => u.role === 'Guru').map(u => {
                let uNip = String(u.nip || '').replace(/^'/, '').trim();
                return `<option value="${uNip}" ${fguru === uNip ? 'selected' : ''}>${u.nama} (${u.mapel || '-'})</option>`;

            let filterGuruDiv = !isGuru ? `

                        <option value="">-- Pilih Guru Mata Pelajaran --</option>
                        ${optGuru}

                </div>
            ` : '';

            let filterLanjutanDiv = fguru ? `
                <div class="w-full ml-1">
                    <div class="grid grid-cols-2 gap-3 mb-3">

                            <select id="faThn" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl p-2.5 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all"><option value="">Semua (Tersimpan)</option>${optThn}</select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 flex items-center"><i class="fas fa-door-open mr-1"></i> Kelas</label>
                            <select id="faKls" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl p-2.5 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all"><option value="">Semua</option>${optKls}</select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 flex items-center"><i class="fas fa-layer-group mr-1"></i> Semester</label>
                            <select id="faSem" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl p-2.5 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all"><option value="">Semua</option><option value="Ganjil" ${fSem==='Ganjil'?'selected':''}>Ganjil</option><option value="Genap" ${fSem==='Genap'?'selected':''}>Genap</option></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 flex items-center"><i class="fas fa-user mr-1"></i> Nama Siswa</label>
                            <input type="text" id="faNama" value="${fNama}" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl p-2.5 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Ketik...">
                        </div>
                    </div>
                    <div class="flex gap-2 w-full">
                        <button onclick="render()" class="flex-1 bg-gray-900 text-white px-5 h-11 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center justify-center font-bold text-sm" title="Filter Data"><i class="fas fa-search lg:mr-2"></i><span class="hidden lg:inline">Cari</span></button>
                        <button onclick="document.getElementById('faKls').value=''; document.getElementById('faThn').value=''; document.getElementById('faSem').value=''; document.getElementById('faNama').value=''; render();" class="w-11 h-11 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200 flex items-center justify-center transition-all" title="Reset Filter"><i class="fas fa-undo"></i></button>
                        <button onclick="cetakAbsensi()" class="flex-1 bg-emerald-500 text-white px-5 h-11 rounded-xl shadow-md shadow-emerald-200 hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center justify-center font-bold text-sm" title="Cetak Absensi"><i class="fas fa-print mr-2"></i>Cetak</button>
                    </div>
                </div>
            ` : `<div class="w-full text-center text-gray-400 font-medium py-3 text-sm"><i class="fas fa-arrow-up mr-2 animate-bounce"></i> Silakan pilih guru mata pelajaran terlebih dahulu.</div>`;

            let tbody = filtered.map((ab, i) => {
                let sis = state.siswa.find(s => s.nisn === ab.nisn);
                let imgHtml = sis ? `<img src="${getValidFoto(sis.foto, sis.nama, sis.jk)}" class="w-8 h-8 rounded-full border border-gray-200 inline-block mr-2">` : '';
                return `<tr class="border-b border-gray-50 hover:bg-blue-50/50 transition-colors"><td class="p-4 text-center text-sm text-gray-500">${i+1}</td><td class="p-4 text-sm whitespace-nowrap font-medium text-gray-700">${ab.tanggal || ab.tgl}</td><td class="p-4 text-sm font-bold text-gray-800 flex items-center">${imgHtml}${ab.nama}</td><td class="p-4 text-sm text-center font-medium text-gray-600">${ab.nisn}</td><td class="p-4 text-sm text-center"><span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg text-xs font-bold border border-indigo-100">${ab.kelas}</span></td><td class="p-4 text-sm text-center">${ab.semester}</td><td class="p-4 text-sm text-center font-black ${ab.status_kehadiran==='Sakit'?'text-amber-500':ab.status_kehadiran==='Ijin'?'text-blue-500':ab.status_kehadiran==='Alpha'?'text-rose-500':'text-emerald-500'} uppercase tracking-wider">${ab.status_kehadiran}</td></tr>`;
            }).join('');

            return `
            ${btnInputFAB}
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800">Data Absensi Siswa</h1>
                <div class="flex gap-2">
                    ${state.currentUser.role === 'Admin' ?`<button onclick="hapusSemuaAbsensi()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 hover:text-red-700 px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition-all"><i class="fas fa-trash-alt mr-2"></i>Kosongkan</button>`:''}
                </div>
            </div>
            
            <div class="bg-white/90 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-gray-100 mb-6 relative group overflow-hidden flex flex-col">
                <div class="absolute left-0 top-0 w-1 h-full bg-gradient-to-b from-amber-400 to-orange-500 rounded-l-2xl"></div>
                ${filterGuruDiv}
                ${filterLanjutanDiv}
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <div class="overflow-x-auto max-h-[60vh] hide-scroll">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead class="bg-white/90 backdrop-blur-md text-gray-600 sticky top-0 shadow-sm border-b border-gray-100 text-[11px] uppercase tracking-wider font-extrabold z-10">

                        </thead>
                        <tbody>${tbody || emptyStateHTML('Absensi')}</tbody>

                </div>
            </div>`;

        window.hapusSemuaAbsensi = function() {
            Swal.fire({ title: 'Hapus SEMUA Absensi?', text: 'Seluruh rekam data absensi akan dihapus permanen.', icon: 'error', showCancelButton: true, confirmButtonColor: '#d33'}).then(async r => {
                if(r.isConfirmed) { 
                    showLoading(); 
                    try { 
                        await deleteAllFromFirebase('absensi'); 
                        closeLoading(); 
                    } catch(e) { closeLoading(); } 
                }
            });
        }

        function renderInputAbsensi() {
            let optKls = getDynamicKelas().map(k=>`<option value="${k}">${k}</option>`).join('');
            let optThn = getSavedTahun().map(t=>`<option value="${t}">${t}</option>`).join('');
            return `
            <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-sm border border-gray-100 p-6 lg:p-10 fade-in">
                <div class="flex items-center justify-between mb-8 border-b border-gray-100 pb-4"><h2 class="text-2xl font-black text-gray-800">Input Absensi Kelas</h2><button onclick="navigate('absensi')" class="w-10 h-10 rounded-full bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-500 transition-colors flex items-center justify-center shadow-sm"><i class="fas fa-times"></i></button></div>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div><label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Tanggal</label><input type="date" id="iaTgl" required value="${getLocalDate()}" class="w-full bg-white border border-gray-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"></div>
                    <div><label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Tahun</label><select id="iaThn" class="w-full bg-white border border-gray-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"><option value="">-Pilih-</option>${optThn}</select></div>
                    <div><label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Kelas</label><select id="iaKls" class="w-full bg-white border border-gray-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"><option value="">-Pilih-</option>${optKls}</select></div>
                    <div><label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Semester</label><select id="iaSem" class="w-full bg-white border border-gray-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"><option value="">-Pilih-</option><option value="Ganjil">Ganjil</option><option value="Genap">Genap</option></select></div>
                    <div class="flex items-end"><button onclick="generateFormAbsensi()" class="w-full bg-blue-600 text-white font-bold py-2.5 px-4 rounded-xl shadow-md shadow-blue-200 hover:bg-blue-700 transition-transform active:scale-95"><i class="fas fa-list-ul mr-2"></i>Tampilkan</button></div>
                </div>
                <div id="areaFormAbsensi"></div>
            </div>`;

        window.generateFormAbsensi = function() {
            const tgl = document.getElementById('iaTgl').value; const t = document.getElementById('iaThn').value; const k = document.getElementById('iaKls').value; const s = document.getElementById('iaSem').value;
            if(!tgl || !t || !k || !s) return Swal.fire('Oops','Silakan lengkapi Tanggal, Tahun, Kelas, dan Semester!','warning');
            
            let sisList = state.siswa.filter(x => x.tahun === t && x.kelas === k).sort((a, b) => parseInt(a.no || 0) - parseInt(b.no || 0));
            if(sisList.length === 0) return document.getElementById('areaFormAbsensi').innerHTML = '<div class="text-center p-10 bg-red-50 border border-red-100 rounded-2xl"><i class="fas fa-exclamation-triangle text-4xl text-red-300 mb-3"></i><p class="font-bold text-red-600">Siswa tidak ditemukan untuk Kelas & Tahun tersebut.</p></div>';
            
            let html = `<form onsubmit="simpanBatchAbsen(event, '${t}', '${k}', '${s}')"><div class="overflow-x-auto pb-4 hide-scroll"><table class="w-full text-left border-collapse min-w-[600px] mb-6 rounded-xl overflow-hidden border border-gray-100"><thead class="bg-gray-50 text-[11px] uppercase tracking-wider font-extrabold text-gray-600"><tr><th class="p-4 border-b w-12 text-center">No</th><th class="p-4 border-b">Nama Siswa</th><th class="p-4 border-b text-center w-64">Status Kehadiran</th></tr></thead><tbody>`;
            sisList.forEach((sis, idx) => {
                html += `<tr class="border-b hover:bg-gray-50"><td class="p-3 text-center text-gray-500 font-medium">${sis.no || idx+1}</td>
                <td class="p-3 flex items-center gap-3">
                    <img src="${getValidFoto(sis.foto, sis.nama, sis.jk)}" class="w-8 h-8 rounded-full border border-gray-200">
                    <span class="font-bold text-gray-800">${sis.nama}</span>
                </td>
                <td class="p-3">
                    <div class="flex justify-center bg-gray-100 p-1 rounded-lg">
                        <label class="flex-1 text-center cursor-pointer"><input type="radio" name="abs_${sis.nisn}" value="Hadir" checked class="hidden peer" onchange="hitungRekap()"><div class="py-1.5 rounded-md font-bold text-sm text-gray-400 peer-checked:bg-emerald-500 peer-checked:text-white transition-colors">H</div></label>
                        <label class="flex-1 text-center cursor-pointer"><input type="radio" name="abs_${sis.nisn}" value="Sakit" class="hidden peer" onchange="hitungRekap()"><div class="py-1.5 rounded-md font-bold text-sm text-gray-400 peer-checked:bg-amber-500 peer-checked:text-white transition-colors">S</div></label>
                        <label class="flex-1 text-center cursor-pointer"><input type="radio" name="abs_${sis.nisn}" value="Ijin" class="hidden peer" onchange="hitungRekap()"><div class="py-1.5 rounded-md font-bold text-sm text-gray-400 peer-checked:bg-blue-500 peer-checked:text-white transition-colors">I</div></label>
                        <label class="flex-1 text-center cursor-pointer"><input type="radio" name="abs_${sis.nisn}" value="Alpha" class="hidden peer" onchange="hitungRekap()"><div class="py-1.5 rounded-md font-bold text-sm text-gray-400 peer-checked:bg-rose-500 peer-checked:text-white transition-colors">A</div></label>
                    </div>
                    <input type="hidden" name="sisIdAbs" value="${sis.nisn}">
                </td></tr>`;
            });
            html += `</tbody></table></div>
                <div class="bg-gray-800 p-5 rounded-2xl mb-8 grid grid-cols-4 text-center shadow-lg transform -translate-y-2">
                    <div class="text-gray-300 text-xs font-bold uppercase tracking-wider">Hadir<div id="r_H" class="text-emerald-400 text-3xl font-black mt-1">${sisList.length}</div></div>
                    <div class="text-gray-300 text-xs font-bold uppercase tracking-wider border-l border-gray-700">Sakit<div id="r_S" class="text-amber-400 text-3xl font-black mt-1">0</div></div>
                    <div class="text-gray-300 text-xs font-bold uppercase tracking-wider border-l border-gray-700">Ijin<div id="r_I" class="text-blue-400 text-3xl font-black mt-1">0</div></div>

                </div>
                <button type="submit" class="bg-blue-600 text-white font-black px-6 py-4 rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-700 w-full text-lg tracking-wide active:scale-95 transition-all"><i class="fas fa-paper-plane mr-2"></i>SIMPAN REKAP ABSENSI</button>
            </form>`;
            document.getElementById('areaFormAbsensi').innerHTML = html;
        }

        window.hitungRekap = function() {

        window.cetakJurnal = function() {
            const fdMulai = document.getElementById('fTglMulai')?.value || '';
            const fdAkhir = document.getElementById('fTglAkhir')?.value || '';
            const fguru = (document.getElementById('fGuru')?.value || '').toLowerCase();
            const r = state.currentUser.role;

            let filtered = state.jurnal.filter(j => {
                if(r === 'Guru' && j.nip !== state.currentUser.nip) return false;
                let passTgl = true; if(fdMulai && j.tgl < fdMulai) passTgl = false; if(fdAkhir && j.tgl > fdAkhir) passTgl = false;
                let passGuru = (j.nama || '').toLowerCase().includes(fguru);
                return passTgl && passGuru;
            });

            if(filtered.length === 0) return Swal.fire('Kosong', 'Tidak ada data jurnal pada rentang/filter ini.', 'warning');

            filtered.sort((a,b) => {
                let dateCmp = a.tgl.localeCompare(b.tgl);
                if (dateCmp !== 0) return dateCmp;
                return parseInt(a.jamMulai) - parseInt(b.jamMulai);
            });

            const formatDateStr = (dateStr) => {
                const pD = dateStr.split('-');
                const d = new Date(pD[0], pD[1]-1, pD[2]);
                const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
                const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

            </div><script>Promise.all(Array.from(document.images).map(img => { if (img.complete) return Promise.resolve(); return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; }); })).then(() => { setTimeout(() => window.print(), 300); });<\/script></body></html>`); printWindow.document.close();
        }

        window.downloadExcelNilai = function() {
            const isGuru = state.currentUser.role === 'Guru';
            const fguru = isGuru ? String(state.currentUser.nip || '').replace(/^'/, '').trim() : (document.getElementById('fnGuru')?.value || '').trim();
            if(!fguru) return Swal.fire('Info', 'Mohon pilih Guru terlebih dahulu!', 'info');

            const fKelas = document.getElementById('fnKls')?.value || '';
            const fTahun = document.getElementById('fnThn')?.value || '';
            const fSem = document.getElementById('fnSem')?.value || '';

            if(!fKelas || !fTahun || !fSem) return Swal.fire('Informasi', 'Mohon pilih Filter "Tahun Pelajaran", "Kelas", dan "Semester" terlebih dahulu untuk mengunduh rekap Excel!', 'info');

            const fNama = (document.getElementById('fnNama')?.value || '').toLowerCase();
            let students = state.siswa.filter(s => s.kelas === fKelas && s.tahun === fTahun && s.nama.toLowerCase().includes(fNama)).sort((a, b) => parseInt(a.no || 0) - parseInt(b.no || 0));
            if(students.length === 0) return Swal.fire('Kosong', 'Tidak ada siswa di kelas tersebut dengan nama yang dicari', 'warning');

            let baseData = state.nilai.filter(a => String(a.nip || a.nip_guru || a.nipGuru || '').replace(/^'/, '').trim() === fguru);
            let filteredNilai = baseData.filter(n => n.kelas === fKelas && n.tahun === fTahun && n.semester === fSem);
            let tpDates = [...new Set(filteredNilai.filter(n => (n.kategori||'TP') === 'TP').map(n => n.tanggal || n.tgl))].sort();
            
            let tpColorsHex = ['#bbdefb', '#ffe0b2', '#fff9c4']; // blue-light, orange-light, yellow
            
            let tpHeaders = tpDates.map((_, i) => `<th style="background-color: ${tpColorsHex[i % tpColorsHex.length]}; border: 1px solid black; padding: 5px; font-weight: bold; width: 60px;">TP ${i+1}</th>`).join('');
            if(tpDates.length === 0) tpHeaders = `<th style="background-color: #bbdefb; border: 1px solid black; padding: 5px; font-weight: bold; width: 60px;">TP 1</th>`; 

            let trs = students.map((s, idx) => {
                let sumNilai = 0; let countNilai = 0;
                let tpCells = tpDates.length > 0 ? tpDates.map((d, i) => {
                    let colorHex = tpColorsHex[i % tpColorsHex.length];
                    let rec = filteredNilai.find(x => x.nisn === s.nisn && (x.tanggal === d || x.tgl === d) && (x.kategori||'TP') === 'TP');
                    if(rec) { sumNilai += parseInt(rec.nilai); countNilai++; }
                    return `<td style="background-color: ${colorHex}; border: 1px solid black; text-align: center; vertical-align: middle;">${rec ? rec.nilai : ''}</td>`;
                }).join('') : `<td style="background-color: #bbdefb; border: 1px solid black; text-align: center; vertical-align: middle;"></td>`;

                let utsRec = filteredNilai.find(x => x.nisn === s.nisn && x.kategori === 'UTS'); if(utsRec) { sumNilai += parseInt(utsRec.nilai); countNilai++; }
                let uasRec = filteredNilai.find(x => x.nisn === s.nisn && x.kategori === 'UAS'); if(uasRec) { sumNilai += parseInt(uasRec.nilai); countNilai++; }
                let avg = countNilai > 0 ? Math.round(sumNilai / countNilai) : '';

                return `<tr>
                    <td style="border: 1px solid black; text-align: center; vertical-align: middle;">${s.no || idx+1}</td>
                    <td style="border: 1px solid black; text-align: center; vertical-align: middle; mso-number-format:'\\@';">${String(s.nis).replace(/^'/, '')} / ${String(s.nisn).replace(/^'/, '')}</td>
                    <td style="border: 1px solid black; text-align: left; vertical-align: middle;">${s.nama}</td>
                    <td style="border: 1px solid black; text-align: center; vertical-align: middle;">${s.jk || '-'}</td>
                    ${tpCells}
                    <td style="background-color: #9fa8da; border: 1px solid black; text-align: center; vertical-align: middle;">${utsRec ? utsRec.nilai : ''}</td>
                    <td style="background-color: #f5f5f5; border: 1px solid black; text-align: center; vertical-align: middle;">${uasRec ? uasRec.nilai : ''}</td>
                    <td style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold;">${avg}</td>
                </tr>`;
            }).join('');

            let tUser = isGuru ? state.currentUser : state.users.find(u => String(u.nip || '').replace(/^'/, '').trim() === fguru);
            let teacherName = tUser ? tUser.nama : '(Guru Tidak Ditemukan)';
            let teacherNip = tUser ? String(tUser.nip || '').replace(/^'/, '').trim() : '-';
            let mapelTextNormal = tUser && tUser.mapel && tUser.mapel !== '-' ? tUser.mapel : 'Mata Pelajaran';
            let mapelText = mapelTextNormal.toUpperCase();

            let kepsek = state.users.find(u => u.role && u.role.trim().toLowerCase() === 'kepala sekolah');
            let namaKepsek = kepsek ? kepsek.nama : '(Data Kepala Sekolah Belum Diinput)';
            let nipKepsek = kepsek ? String(kepsek.nip || '').replace(/^'/, '').trim() : '-';

            let totalCols = Math.max(tpDates.length, 1) + 7;
            let colSpanTengah = Math.max(tpDates.length, 1) + 1;

            let htmlTable = `
                <table style="border-collapse: collapse; font-family: Arial, sans-serif; font-size: 11pt;">
                    <tr>
                        <td colspan="${totalCols}" style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px;">
                            <img src="https://i.imghippo.com/files/UL4915SP.png" height="80">
                        </td>
                    </tr>
                    <tr><td colspan="${totalCols}"></td></tr>
                    <tr><td colspan="${totalCols}" style="text-align: center; font-size: 14pt; font-weight: bold;">DAFTAR NILAI ${mapelText}</td></tr>
                    <tr><td colspan="${totalCols}" style="text-align: center; font-size: 12pt; font-weight: bold;">TAHUN PELAJARAN ${fTahun}</td></tr>
                    <tr><td colspan="${totalCols}"></td></tr>
                    <tr>
                        <td colspan="2" style="font-weight: bold;">Kelas : ${fKelas}</td>
                        <td colspan="${Math.max(tpDates.length, 1) + 2}" style="font-weight: bold; text-align: center;">Mapel : ${mapelTextNormal}</td>
                        <td colspan="3" style="font-weight: bold; text-align: right;">Semester : ${fSem === 'Ganjil' ? '1 (Ganjil)' : '2 (Genap)'}</td>
                    </tr>
                    <tr><td colspan="${totalCols}"></td></tr>
                    
                    <tr>
                        <th rowspan="2" style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 40px;">NO</th>
                        <th rowspan="2" style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 120px;">NIS/NISN</th>
                        <th rowspan="2" style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 250px;">NAMA SISWA</th>
                        <th rowspan="2" style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 40px;">L/P</th>
                        <th colspan="${Math.max(tpDates.length, 1) + 2}" style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold;">RUBRIK</th>
                        <th rowspan="2" style="background-color: #dcedc8; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 90px;">TOTAL NILAI</th>
                    </tr>
                    <tr>
                        ${tpHeaders}
                        <th style="background-color: #9fa8da; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 60px;">UTS</th>
                        <th style="background-color: #f5f5f5; border: 1px solid black; text-align: center; vertical-align: middle; font-weight: bold; width: 60px;">UAS</th>
                    </tr>
                    ${trs}
                    <tr><td colspan="${totalCols}"></td></tr>
                    <tr>
                        <td colspan="3" style="text-align: center; vertical-align: top;">Mengetahui<br>Kepala SMP Negeri 1 Dawan<br><br><br><br><b><u>${namaKepsek}</u></b><br>NIP. ${nipKepsek}</td>
                        <td colspan="${colSpanTengah}"></td>
                        <td colspan="3" style="text-align: center; vertical-align: top;">Dawan, ${new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}<br>Guru ${mapelTextNormal}<br><br><br><br><b><u>${teacherName}</u></b><br>NIP. ${teacherNip}</td>
                    </tr>
                </table>
            `;

            let template = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>{worksheet}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>{table}</body></html>';
            let base64 = function(s) { return window.btoa(unescape(encodeURIComponent(s))) };
            let format = function(s, c) { return s.replace(/{(\w+)}/g, function(m, p) { return c[p]; }) };
            
            let ctx = {worksheet: 'Data Nilai', table: htmlTable};
            let link = document.createElement("a");
            link.download = `Rekap_Nilai_${fKelas}_${fSem}.xls`;
            link.href = 'data:application/vnd.ms-excel;base64,' + base64(format(template, ctx));
            link.click();
        }

        // ================= INISIALISASI AUTENTIKASI FIREBASE =================
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            firebaseUser = user;
            if (user) {
                await checkDefaultAdmin();
                attachListeners();
            }
        });

        // Jalankan Autentikasi dan Render Pertama
        initAuth();
        render();

    </script>
</body>
</html>
